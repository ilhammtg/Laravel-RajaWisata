; PHP-FPM Pool Config — Optimized for Docker containers
; Static pool: pre-spawned workers, no overhead spawning new processes on each request

[www]
user = www-data
group = www-data
listen = 9000

; Use static pool: faster than dynamic since we always have workers ready
pm = static
pm.max_children = 10

; Respawn workers periodically to prevent memory leaks
pm.max_requests = 500

; Increase limits for larger requests
php_admin_value[memory_limit] = 256M
php_admin_value[upload_max_filesize] = 64M
php_admin_value[post_max_size] = 64M

; Reduce request logging overhead
access.log = /dev/null

; Keep connection alive to Nginx
ping.path = /ping
ping.response = pong
